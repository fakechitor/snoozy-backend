spring:
  application:
    name: snoozy-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**,/api/v1/friends/**
              filters:
                - JwtAuthenticationFilterGateway
            - id: group-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/groups/**
              filters:
                - JwtAuthenticationFilterGateway
            - id: file-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/files/**
            - id: alarm-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/alarms/**
              filters:
                - JwtAuthenticationFilterGateway
jwt:
  secret-token: ${JWT_SECRET_TOKEN}