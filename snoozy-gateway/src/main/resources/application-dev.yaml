spring:
  application:
    name: snoozy-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**
              filters:
                - JwtAuthenticationFilterGateway
jwt:
  secret-token: ${JWT_SECRET_TOKEN}