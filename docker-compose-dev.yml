services:
  db:
    container_name: db_postgres
    image: postgres:17.2
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  kafka:
    container_name: kafka
    image: apache/kafka:3.9.2
    restart: always
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/data
    networks:
      - app_network
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

volumes:
  pg_data:
  kafka_data:
  minio_data:
    driver: local

networks:
  app_network:
    driver: bridge